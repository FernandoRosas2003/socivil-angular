@if (!auth.isLoggedIn()) {
<section class="hero hero-about">
  <img src="iniciosesion.jpg" alt="Login" class="hero-img">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Únete como Voluntario</h1>
    <p>Inicia sesión para acceder a todas las actividades</p>
  </div>
</section>

<section class="contact">
  <div class="contact-container">

    <div class="contact-form">
      <h2>Inicia Sesión</h2>

      @if (error) {
        <div class="mensaje-error">{{ error }}</div>
      }

      <form (ngSubmit)="submit()">

        <input 
          type="text" 
          name="usuario"
          [(ngModel)]="usuario" 
          placeholder="Nombre de Usuario" 
          required
          [disabled]="cargando"
        >

        <input 
          type="password" 
          name="password"
          [(ngModel)]="password" 
          placeholder="Contraseña" 
          required
          [disabled]="cargando"
        >

        @if (!cargando) {
          <button type="submit" class="btn btn-voluntario">
            Iniciar Sesión
          </button>
        } @else {
          <div class="spinner-container">
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
          </div>
        }

      </form>

      <br>
      <div class="login-links">
        <a routerLink="/registro">¿No estás registrado? Regístrate</a>
        <br><br>
        <a routerLink="/recuperar-contrasena">¿Olvidaste tu contraseña?</a>
      </div>

    </div>

    <div class="contact-info"></div>

  </div>
</section>
}
<style>

/* ===== GENERAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fb;
  color: #111827;
  text-align: center;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: absolute;
  z-index: 2;
  color: white;
  max-width: 850px;
  padding: 20px;

  /* 🔥 CENTRADO PERFECTO */
  text-align: center;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.hero-content h1 {
  font-size: 65px;
  font-weight: 800;
  margin-bottom: 25px;
}

.hero-content p {
  font-size: 20px;
  line-height: 1.7;
  opacity: 0.95;
}

/* ===== LAYOUT ===== */
.contact {
  padding: 90px 20px;
  background: #f5f7fb;
}

.contact-container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

/* ===== FORM CARD ===== */
.contact-form {
  background: white;
  padding: 40px;
  border-radius: 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: left;
}

.contact-form h2 {
  font-size: 32px;
  margin-bottom: 25px;
  font-weight: 800;
}

/* inputs */
.contact-form input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  transition: 0.3s;
  outline: none;
}

.contact-form input:focus {
  border-color: #cc0000;
  box-shadow: 0 0 0 3px rgba(204,0,0,0.15);
}

/* ===== ERROR ===== */
.mensaje-error {
  background: #ffe5e5;
  color: #b00020;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-weight: 600;
}

/* ===== BOTÓN ===== */
.btn {
  padding: 15px 28px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.btn-voluntario {
  background: #cc0000;
  color: white;
  width: 100%;
  box-shadow: 0 8px 20px rgba(204,0,0,0.25);
}

.btn-voluntario:hover {
  background: #990000;
  transform: translateY(-3px);
}

/* ===== LINKS ===== */
.login-links {
  margin-top: 15px;
  text-align: center;
}

.login-links a {
  color: #cc0000;
  font-weight: 600;
  text-decoration: none;
}

.login-links a:hover {
  text-decoration: underline;
}

/* ===== SPINNER ===== */
.spinner-container {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 20px;
}

.dot {
  width: 10px;
  height: 10px;
  background: #cc0000;
  border-radius: 50%;
  animation: bounce 0.6s infinite alternate;
}

.dot2 { animation-delay: 0.2s; }
.dot3 { animation-delay: 0.4s; }

@keyframes bounce {
  from { transform: translateY(0); opacity: 0.6; }
  to { transform: translateY(-10px); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  .hero {
    height: 85vh;
  }

  .hero-content h1 {
    font-size: 42px;
  }

  .hero-content p {
    font-size: 17px;
  }

  .contact-container {
    grid-template-columns: 1fr;
  }

  .contact-form {
    text-align: center;
  }
}

</style>
