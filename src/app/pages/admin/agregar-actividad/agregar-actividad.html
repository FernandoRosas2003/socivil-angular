<section class="contact">
  <div class="contact-container">
    <div class="contact-form" style="max-width: 800px; margin: auto;">
      <h2 style="margin-bottom: 30px;">Crear Nueva Actividad</h2>

      @if (exito) {
        <div style="text-align: center; padding: 40px;">
          <p class="success-text" style="font-size: 1.2rem; margin-bottom: 20px;">✅ Actividad añadida correctamente</p>
          <a routerLink="/admin" class="btn btn-red">Volver al panel</a>
        </div>
      } @else {
        
        @if (error) { 
          <div class="mensaje-error" style="margin-bottom: 25px;">{{ error }}</div> 
        }

        <div class="form-activity">
          <!-- Título -->
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Título de la actividad</label>
            <input type="text" [(ngModel)]="form.titulo" placeholder="Ej: Taller de Voluntariado" required>
          </div>

          <!-- Descripción -->
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Descripción</label>
            <textarea [(ngModel)]="form.descripcion" placeholder="Detalles de la actividad..." rows="6" 
              style="width: 100%; padding: 12px 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit; resize: vertical;"></textarea>
          </div>

          <!-- Fila de Fecha y Plazas -->
          <div style="display: flex; gap: 30px; margin-bottom: 25px;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Fecha</label>
              <input type="date" [(ngModel)]="form.fecha" required>
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Plazas máximas</label>
              <input type="number" [(ngModel)]="form.plazas_max" placeholder="0" required>
            </div>
          </div>

          <!-- Imagen -->
          <div style="margin-bottom: 35px;">
            <label style="display: block; margin-bottom: 12px; font-weight: bold;">Imagen de la actividad</label>
            <input type="file" (change)="onImagen($event)" style="border: none; padding: 0;">
          </div>

          <!-- Botones -->
          <div style="display: flex; gap: 20px; margin-top: 10px;">
            <button class="btn btn-red" (click)="crear()" style="flex: 1; border: none; padding: 15px; cursor: pointer; font-size: 16px;">
              Crear actividad
            </button>
            <a routerLink="/admin" class="btn btn-outline" 
              style="flex: 1; text-align: center; border: 1px solid #ccc; color: #333; padding: 15px; font-size: 16px; display: flex; align-items: center; justify-content: center;">
              Volver
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
<style>

</style>
