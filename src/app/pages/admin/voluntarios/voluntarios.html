<section class="services">
  <h2>Eliminar Voluntarios</h2>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody>
        @for (u of usuarios; track u.id) {
          <tr>
            <td>{{ u.usuario }}</td>
            <td>{{ u.nombre }} {{ u.apellido }}</td>
            <td>{{ u.email }}</td>
            <td>
              <button class="btn btn-red" (click)="eliminar(u.id)">
                Eliminar
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="back-container">
    <a routerLink="/admin" class="btn btn-red">Volver</a>
  </div>
</section>
