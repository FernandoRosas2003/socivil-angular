<style>

/* ===== GENERAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fb;
  color: #111827;
  text-align: center;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: absolute;
  z-index: 2;
  color: white;
  max-width: 850px;
  padding: 20px;
  text-align: center;
}

.hero-content h1 {
  font-size: 65px;
  font-weight: 800;
  margin-bottom: 25px;
}

.hero-content p {
  font-size: 20px;
  opacity: 0.95;
  line-height: 1.7;
}

/* ===== CONTACT SECTION ===== */
.contact {
  padding: 90px 20px;
  background: #f5f7fb;
}

.contact-container {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

/* ===== FORM ===== */
.contact-form {
  background: white;
  padding: 40px;
  border-radius: 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: left;
}

.contact-form h2 {
  font-size: 32px;
  margin-bottom: 25px;
  font-weight: 800;
  color: #111827;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 15px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  transition: 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #cc0000;
  box-shadow: 0 0 0 3px rgba(204,0,0,0.15);
}

/* ===== INFO ===== */
.contact-info {
  background: white;
  padding: 40px;
  border-radius: 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: left;
}

.contact-info h2 {
  font-size: 28px;
  margin-bottom: 15px;
  font-weight: 800;
}

.contact-info p {
  color: #4b5563;
  font-size: 16px;
  margin-bottom: 10px;
  line-height: 1.6;
}

/* ===== MAP ===== */
.map iframe {
  width: 100%;
  height: 320px;
  border-radius: 16px;
  margin-top: 15px;
}

/* ===== BOTONES ===== */
.btn {
  padding: 15px 28px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.btn-red {
  background: #cc0000;
  color: white;
  width: 100%;
  box-shadow: 0 8px 20px rgba(204,0,0,0.25);
}

.btn-red:hover {
  background: #990000;
  transform: translateY(-3px);
  box-shadow: 0 12px 25px rgba(204,0,0,0.35);
}

/* ===== SUCCESS ===== */
.success-text {
  color: green;
  font-weight: bold;
  margin-bottom: 15px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  .hero {
    height: 85vh;
  }

  .hero-content h1 {
    font-size: 42px;
  }

  .hero-content p {
    font-size: 17px;
  }

  .contact-container {
    grid-template-columns: 1fr;
  }

  .contact-form,
  .contact-info {
    text-align: center;
  }
}

</style>
<section class="hero hero-about">
  <img src="contacto.png" alt="Contacto" class="hero-img">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Contacto</h1>
    <p>¿Tienes alguna pregunta o quieres colaborar con nosotros? ¡Escríbenos!</p>
  </div>
</section>

<section class="contact">
  <div class="contact-container">
    <div class="contact-form">
      <h2>Envíanos un mensaje</h2>
      @if (ok) {
        <p class="success-text">Mensaje enviado correctamente ✅</p>
      }
      <form>
        <input type="text" [(ngModel)]="form.nombre" name="nombre" placeholder="Tu nombre" required>
        <input type="email" [(ngModel)]="form.email" name="email" placeholder="Tu correo" required>
        <textarea [(ngModel)]="form.mensaje" name="mensaje" placeholder="Tu mensaje" rows="6" required></textarea>
        <button class="btn btn-red" type="button" (click)="enviar()">Enviar Mensaje</button>
      </form>
    </div>
    <div class="contact-info">
      <h2>Información de Contacto</h2>
      <p><strong>Correo:</strong> secretaria.socivil&#64;gmail.com</p>
      <p><strong>Teléfono:</strong> +34 644 45 53 26</p>
      <br>
      <h2>Encuéntranos</h2>
      <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6397.975790391505!2d-4.45787772470178!3d36.69882877340816!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd72f9df58e7545f%3A0x213b598adf9e7875!2sAv%20de%20Europa%2C%20108%2C%20Carretera%20de%20C%C3%A1diz%2C%2029003%20M%C3%A1laga!5e0!3m2!1ses!2ses"
          width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </div>
</section>
