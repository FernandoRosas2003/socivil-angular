<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  /* ===== RESET BÁSICO ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .footer {
    background: #111827;
    color: white;
    padding: 70px 40px 40px; 
    font-family: 'Poppins', sans-serif;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  /* ===== COLUMNAS ===== */
  .footer-col {
    display: flex;
    flex-direction: column;
  }

  .footer-col h4 {
    font-size: 22px;
    margin-bottom: 20px; /* Aumentado para dar espacio a la línea más baja */
    font-weight: 700;
    color: white;
    position: relative;
    white-space: nowrap;
  }

  /* ESTA ES LA LÍNEA ROJA */
  .footer-col h4::after {
    content: '';
    width: 45px;
    height: 3px;
    background: #cc0000;
    position: absolute;
    bottom: -5px; /* CAMBIO: Antes estaba en -8px, ahora más abajo */
    left: 0;
    border-radius: 20px;
  }

  /* ===== TEXTOS Y ENLACES (NOWRAP) ===== */
  .footer-col p {
    color: #d1d5db;
    line-height: 0.0;
    font-size: 15px;
    margin-top: 5px;
    white-space: nowrap; 
  }

  .footer-col a {
    color: #d1d5db;
    text-decoration: none;
    margin-bottom: 14px;
    font-size: 15px;
    transition: all 0.3s ease;
    width: fit-content;
    display: block;
    white-space: nowrap; 
  }

  .footer-col a:hover {
    color: #ffffff;
    transform: translateX(5px);
  }

  /* ===== REDES SOCIALES ===== */
  .social-icons {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .social-icons img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    background: white;
    padding: 8px;
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .social-icons img:hover {
    transform: translateY(-4px) scale(1.08);
    background: #cc0000;
  }

  /* ===== FOOTER BOTTOM (SEPARADO) ===== */
  .footer-bottom {
    grid-column: 1 / -1;
    text-align: center;
    padding-top: 35px;
    color: #9ca3af;
    font-size: 14px;
    line-height: 0.6;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 15px;
  }

  .footer-bottom p {
    margin-top: 10px;
    font-size: 11px;
    color: #6b7280;
    line-height: 1.4;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .footer {
      grid-template-columns: 1fr;
      text-align: center;
      padding: 55px 25px 30px;
    }

    .footer-col {
      align-items: center;
      margin-bottom: 30px;
    }

    .footer-col p, .footer-col a {
      white-space: normal;
    }

    .footer-col h4::after {
      left: 50%;
      transform: translateX(-50%);
    }

    .social-icons {
      justify-content: center;
    }
  }
</style>
</head>
<body>

<footer class="footer">
  <div class="footer-col">
    <h4>Socivil España</h4>
    <p>Trabajando juntos por un futuro mejor</p>
  </div>

  <div class="footer-col">
    <h4>Enlaces</h4>
    <a href="/aviso-legal">Aviso Legal</a>
    <a href="/privacidad">Política de Privacidad</a>
    <a href="/cookies">Configuración de cookies</a>
  </div>

  <div class="footer-col">
    <h4>Síguenos</h4>
    <div class="social-icons">
      <a href="https://x.com/SocivilESP" target="_blank"><img src="x.png" alt="X"></a>
      <a href="https://www.instagram.com/socivilesp/" target="_blank"><img src="instagram.png" alt="Instagram"></a>
      <a href="https://www.tiktok.com/@socivilesp" target="_blank"><img src="tiktok.png" alt="TikTok"></a>
    </div>
  </div>
  <div class="footer-bottom">
    &copy; 2026 Socivil España. Todos los derechos reservados.
    <p>
      Inscrita en el Registro Nacional de Asociaciones:<br>
      Grupo 1 / Sección 1 / Número Nacional 590194
    </p>
  </div>
</footer>

</body>
</html>
